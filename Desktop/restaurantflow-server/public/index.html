<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bella Tavola — Events & Catering</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:rgba(201,168,76,0.15);--dark:#0E0C0A;--surface2:#1E1B17;--surface3:#252118;--border:rgba(201,168,76,0.22);--text:#F2EDE4;--text-muted:#9A9080;--text-dim:#5A5448;--red:#C44B3A;--green:#4A8C5C}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overflow:hidden}
body{display:flex;flex-direction:column;align-items:center}
body::before{content:'';position:fixed;top:-180px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}
.header{width:100%;max-width:720px;padding:20px 28px 0;position:relative;z-index:1;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.brand-mark{width:30px;height:30px;border:1.5px solid var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold);font-weight:600}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;letter-spacing:.07em;color:var(--gold-light);text-transform:uppercase}
.header-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:14px}
.restaurant-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;font-style:italic;color:var(--text)}
.restaurant-tagline{font-size:11px;color:var(--text-muted);letter-spacing:.09em;text-transform:uppercase;margin-top:3px}
.status-pill{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.chat-wrap{width:100%;max-width:720px;flex:1;display:flex;flex-direction:column;padding:0 28px;min-height:0;position:relative;z-index:1}
.chat-window{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:18px 0 10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat-window::-webkit-scrollbar{width:3px}
.chat-window::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;gap:12px;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.agent{align-items:flex-start}
.msg.user{align-items:flex-start;flex-direction:row-reverse}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600}
.avatar.agent-av{background:var(--gold-dim);border:1.5px solid var(--border);color:var(--gold)}
.avatar.user-av{background:var(--surface3);border:1px solid rgba(255,255,255,.07);color:var(--text-muted);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500}
.bubble{max-width:80%;padding:11px 16px;border-radius:16px;font-size:15px;line-height:1.65}
.agent .bubble{background:var(--surface2);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text)}
.user .bubble{background:var(--gold-dim);border:1px solid rgba(201,168,76,.28);border-top-right-radius:4px;color:var(--text)}
.typing-dots{display:flex;gap:5px;align-items:center;padding:3px 0}
.typing-dots span{width:6px;height:6px;background:var(--gold);border-radius:50%;opacity:.3;animation:dot 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.85)}40%{opacity:1;transform:scale(1.15)}}
.summary-card{background:linear-gradient(135deg,var(--surface2),var(--surface3));border:1px solid var(--gold);border-radius:14px;padding:18px 22px;max-width:80%;animation:fadeUp .4s ease both}
.summary-card h4{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;color:var(--gold-light);margin-bottom:12px;letter-spacing:.1em;text-transform:uppercase}
.summary-row{display:flex;justify-content:space-between;gap:16px;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(201,168,76,.1)}
.summary-row:last-child{border-bottom:none}
.summary-label{color:var(--text-muted);white-space:nowrap}
.summary-value{color:var(--text);font-weight:500;text-align:right}
.summary-footer{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted);text-align:center}
.input-area{flex-shrink:0;padding:10px 0 22px;background:linear-gradient(to top,var(--dark) 70%,transparent)}
.voice-status{text-align:center;font-size:12px;color:var(--red);height:16px;margin-bottom:8px;letter-spacing:.06em;opacity:0;transition:opacity .3s}
.voice-status.show{opacity:1}
.input-row{display:flex;gap:10px;align-items:flex-end;background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:10px 12px;transition:border-color .25s,box-shadow .25s}
.input-row:focus-within{border-color:rgba(201,168,76,.55)}
.input-row.listening{border-color:var(--red);box-shadow:0 0 0 3px rgba(196,75,58,.13)}
textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;resize:none;line-height:1.5;max-height:100px;min-height:24px}
textarea::placeholder{color:var(--text-dim)}
.icon-btn{width:38px;height:38px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.mic-btn{background:var(--surface3);color:var(--text-muted)}
.mic-btn:hover{background:rgba(201,168,76,.12);color:var(--gold)}
.mic-btn.active{background:rgba(196,75,58,.2);color:var(--red);animation:micpulse 1.5s ease-in-out infinite}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(196,75,58,.35)}50%{box-shadow:0 0 0 8px rgba(196,75,58,0)}}
.send-btn{background:var(--gold);color:var(--dark)}
.send-btn:hover{background:var(--gold-light);transform:scale(1.04)}
.send-btn:disabled{background:var(--surface3);color:var(--text-dim);cursor:not-allowed;transform:none}
.waveform{display:none;align-items:center;gap:3px;height:22px}
.waveform.show{display:flex}
.waveform span{width:3px;background:var(--red);border-radius:2px;animation:wave .75s ease-in-out infinite}
.waveform span:nth-child(1){height:5px;animation-delay:0s}
.waveform span:nth-child(2){height:13px;animation-delay:.1s}
.waveform span:nth-child(3){height:20px;animation-delay:.2s}
.waveform span:nth-child(4){height:9px;animation-delay:.3s}
.waveform span:nth-child(5){height:15px;animation-delay:.15s}
.waveform span:nth-child(6){height:7px;animation-delay:.25s}
@keyframes wave{0%,100%{transform:scaleY(.4);opacity:.5}50%{transform:scaleY(1);opacity:1}}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{background:var(--surface3);border:1px solid var(--border);border-radius:20px;padding:6px 15px;font-size:13px;color:var(--text-muted);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;font-weight:300}
.chip:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.restart-btn{display:block;margin:8px auto 0;background:none;border:1px solid var(--border);border-radius:20px;padding:5px 16px;font-size:12px;color:var(--text-dim);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.restart-btn:hover{border-color:var(--gold);color:var(--gold)}
</style>
</head>
<body>
<div class="header">
  <div class="brand">
    <div class="brand-mark">RF</div>
    <span class="brand-name">RestaurantFlow &middot; NM Automation</span>
  </div>
  <div class="header-row">
    <div>
      <div class="restaurant-name">Bella Tavola</div>
      <div class="restaurant-tagline">Italian &middot; Private Events &middot; Banquets &middot; Catering</div>
    </div>
    <div class="status-pill"><div class="status-dot"></div>Sofia &mdash; Live</div>
  </div>
</div>
<div class="chat-wrap">
  <div class="chat-window" id="chatWindow"></div>
  <div class="input-area">
    <div class="voice-status" id="voiceStatus">Listening &mdash; speak now</div>
    <div class="input-row" id="inputRow">
      <div class="waveform" id="waveform"><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <textarea id="userInput" placeholder="Tell me what you're planning..." rows="1"></textarea>
      <button class="icon-btn mic-btn" id="micBtn" onclick="toggleVoice()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="icon-btn send-btn" id="sendBtn" onclick="handleSend()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="chips" id="chipsArea"></div>
    <button class="restart-btn" onclick="restartChat()">Start over</button>
  </div>
</div>
<script>
let history=[],inquiryData=null,recognition=null,isListening=false,busy=false;
async function callServer(messages){
  const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||'Server error');}
  const data=await res.json();return data.reply||'';
}
function setupSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();r.continuous=false;r.interimResults=true;r.lang='en-US';
  r.onresult=(e)=>{const t=Array.from(e.results).map(r=>r[0].transcript).join('');document.getElementById('userInput').value=t;autoResize();if(e.results[e.results.length-1].isFinal){stopVoice();setTimeout(()=>handleSend(),350);}};
  r.onerror=()=>stopVoice();r.onend=()=>{if(isListening)stopVoice();};return r;
}
function toggleVoice(){
  if(isListening){stopVoice();return;}
  if(!recognition)recognition=setupSpeech();
  if(!recognition){alert('Voice not supported. Try Chrome.');return;}
  isListening=true;recognition.start();
  document.getElementById('micBtn').classList.add('active');
  document.getElementById('inputRow').classList.add('listening');
  document.getElementById('voiceStatus').classList.add('show');
  document.getElementById('waveform').classList.add('show');
  document.getElementById('userInput').placeholder='';
}
function stopVoice(){
  isListening=false;if(recognition)try{recognition.stop();}catch(e){}
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('inputRow').classList.remove('listening');
  document.getElementById('voiceStatus').classList.remove('show');
  document.getElementById('waveform').classList.remove('show');
  document.getElementById('userInput').placeholder='Tell me what you\'re planning...';
}
function speak(text){
  if(!window.speechSynthesis)return;speechSynthesis.cancel();
  const clean=text.replace(/INQUIRY_COMPLETE:\{[\s\S]*?\}/g,'').trim();if(!clean)return;
  const u=new SpeechSynthesisUtterance(clean);u.rate=0.93;u.pitch=1.05;
  const voices=speechSynthesis.getVoices();
  const pick=voices.find(v=>v.name.includes('Samantha')||v.name.includes('Karen')||v.name.includes('Victoria'))||voices.find(v=>v.lang==='en-US');
  if(pick)u.voice=pick;speechSynthesis.speak(u);
}
function appendMessage(role,raw){
  const win=document.getElementById('chatWindow');
  const match=raw.match(/INQUIRY_COMPLETE:(\{[\s\S]*?\})/);
  if(match){try{inquiryData=JSON.parse(match[1]);}catch(e){}raw=raw.replace(/INQUIRY_COMPLETE:[\s\S]*$/,'').trim();}
  if(raw){
    const div=document.createElement('div');div.className=`msg ${role==='assistant'?'agent':'user'}`;
    const av=document.createElement('div');av.className=`avatar ${role==='assistant'?'agent-av':'user-av'}`;av.textContent=role==='assistant'?'S':'Y';
    const b=document.createElement('div');b.className='bubble';b.textContent=raw;
    div.appendChild(av);div.appendChild(b);win.appendChild(div);
  }
  if(inquiryData&&role==='assistant'){
    const wrap=document.createElement('div');wrap.className='msg agent';wrap.style.marginTop='4px';
    const sp=document.createElement('div');sp.style.width='34px';sp.style.flexShrink='0';
    const card=document.createElement('div');card.className='summary-card';
    const fields=[['Guest',inquiryData.name],['Event',inquiryData.event],['Date',inquiryData.date],['Guests',inquiryData.guests],['Space',inquiryData.room],['Food',inquiryData.food],['Bar',inquiryData.bar],['Dietary',inquiryData.dietary],['Budget',inquiryData.budget],['Phone',inquiryData.phone],['Email',inquiryData.email]].filter(([,v])=>v&&v.trim());
    card.innerHTML='<h4>Inquiry Captured</h4>'+fields.map(([l,v])=>`<div class="summary-row"><span class="summary-label">${l}</span><span class="summary-value">${v}</span></div>`).join('')+'<div class="summary-footer">Sent to events team &middot; 847-555-0192</div>';
    wrap.appendChild(sp);wrap.appendChild(card);win.appendChild(wrap);inquiryData=null;
  }
  win.scrollTop=win.scrollHeight;
}
function showTyping(){
  const win=document.getElementById('chatWindow');
  const d=document.createElement('div');d.className='msg agent';d.id='typingBubble';
  d.innerHTML='<div class="avatar agent-av">S</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  win.appendChild(d);win.scrollTop=win.scrollHeight;
}
function removeTyping(){const el=document.getElementById('typingBubble');if(el)el.remove();}
const CHIPS={start:['Plan a private event','Catering inquiry','Birthday celebration','Corporate lunch'],date:['This weekend','Next month','2-3 months out','Date is flexible'],food:['Family-style','Buffet','Plated dinner','Not sure yet'],bar:['Full open bar','Beer and wine','No alcohol'],yesno:['Yes','No','Not sure']};
function showChips(set){
  const area=document.getElementById('chipsArea');area.innerHTML='';
  (CHIPS[set]||[]).forEach(label=>{const btn=document.createElement('button');btn.className='chip';btn.textContent=label;btn.onclick=()=>{document.getElementById('userInput').value=label;area.innerHTML='';handleSend();};area.appendChild(btn);});
}
async function handleSend(){
  const ta=document.getElementById('userInput');const txt=ta.value.trim();
  if(!txt||busy)return;
  busy=true;document.getElementById('sendBtn').disabled=true;document.getElementById('chipsArea').innerHTML='';
  appendMessage('user',txt);ta.value='';autoResize();showTyping();
  try{
    const msgs=history.concat([{role:'user',content:txt}]);
    const reply=await callServer(msgs);
    history.push({role:'user',content:txt});history.push({role:'assistant',content:reply});
    removeTyping();appendMessage('assistant',reply);speak(reply);
    const lo=reply.toLowerCase();
    if(lo.includes('what date')||lo.includes('when were you')||lo.includes('what day'))showChips('date');
    else if(lo.includes('food')||lo.includes('buffet')||lo.includes('family-style')||lo.includes('plated'))showChips('food');
    else if(lo.includes('bar')||lo.includes('alcohol')||lo.includes('drinks'))showChips('bar');
    else if(lo.includes('dietary')||lo.includes('allerg')||lo.includes('vegetarian'))showChips('yesno');
  }catch(err){removeTyping();appendMessage('assistant','I am having a moment of trouble. Please try again or call us at 847-555-0192.');console.error(err);}
  busy=false;document.getElementById('sendBtn').disabled=false;
}
function autoResize(){const ta=document.getElementById('userInput');ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,100)+'px';}
document.getElementById('userInput').addEventListener('input',autoResize);
document.getElementById('userInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}});
if(window.speechSynthesis)speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
function restartChat(){history=[];inquiryData=null;document.getElementById('chatWindow').innerHTML='';document.getElementById('chipsArea').innerHTML='';initChat();}
async function initChat(){
  showTyping();await new Promise(r=>setTimeout(r,900));removeTyping();
  const g="Welcome to Bella Tavola. I am Sofia, your private events and catering concierge. Whether you are planning a birthday celebration, a corporate dinner, a wedding rehearsal, or a catering order, I am here to make it effortless. What are you thinking about putting together?";
  appendMessage('assistant',g);history.push({role:'assistant',content:g});speak(g);showChips('start');
}
initChat();
</script>
</body>
</html>
